services:
  app:
    build: .
    ports:
      - "9002:9002"
    volumes:
      - ./app/bd/historical:/code/app/bd/historical
      - lottery-models:/code/app/bd/models
    environment:
      DATA_DIR: /code/app/bd/historical
      MODEL_STORE_DIR: /code/app/bd/models
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  lottery-models:
